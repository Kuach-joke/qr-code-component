<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Joke'z QR-Code-Card</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://va.vercel-scripts.com/script.js" defer></script>
  </head>
  <body>
    <div class="desktop-layout">
      <div class="content">
        <img
          class="QR-image"
          src="images/image-qr-code.png"
          alt="QR code linking to Frontend Mentor"
        />
        <div class="text">
          <p class="improve-your-front-e">
            Improve your front-end skills by building projects
          </p>
          <p class="scan-the-QR-code-to">
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </div>
      </div>
    <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://www.wizzoviz.tech/">Joke Wizzo 🦅</a>.
  </footer>
    </div>
  </body>
</html>
